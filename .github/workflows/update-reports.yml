name: Update Reports

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

concurrency:
  group: update-reports
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TZ: Asia/Yekaterinburg
      BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL }}
      SKOROZVON_USERNAME: ${{ secrets.SKOROZVON_USERNAME }}
      SKOROZVON_API_KEY: ${{ secrets.SKOROZVON_API_KEY }}
      SKOROZVON_CLIENT_ID: ${{ secrets.SKOROZVON_CLIENT_ID }}
      SKOROZVON_CLIENT_SECRET: ${{ secrets.SKOROZVON_CLIENT_SECRET }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
      GOOGLE_SPREADSHEET_TITLE: ${{ vars.GOOGLE_SPREADSHEET_TITLE || 'Авто-отчеты' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore reporting database
        uses: actions/cache@v4
        with:
          path: data/reporting-db.json
          key: reporting-db-${{ github.run_id }}
          restore-keys: |
            reporting-db-

      - name: Check restored database
        id: db-state
        shell: bash
        run: |
          if [ -f data/reporting-db.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update full current month on cold start
        if: ${{ steps.db-state.outputs.exists != 'true' }}
        run: npm run report:full-month:sheets

      - name: Update current day on warm start
        if: ${{ steps.db-state.outputs.exists == 'true' }}
        run: npm run report:2h:sheets
